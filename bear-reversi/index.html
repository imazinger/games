<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>くまのリバーシ</title>
<meta name="theme-color" content="#FBF6EC">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐻</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ホーム画面 -->
  <section id="screen-home" class="screen active">
    <div id="logo" class="logo"></div>
    <h1>くまのリバーシ</h1>
    <p class="tagline">ちゃくま と しろくま の はちみつ争奪戦</p>
    <div class="menu">
      <button id="btn-cpu" class="btn">🏠ひとり用 ルーム</button>
      <button id="btn-create" class="btn primary">🏘️ ふたり用 ルームをつくる</button>
      <div class="join-box">
        <input id="input-code" type="text" inputmode="latin" autocapitalize="characters"
               autocomplete="off" spellcheck="false" maxlength="4" placeholder="コード">
        <button id="btn-join" class="btn secondary">はいる</button>
      </div>
      <button id="btn-local" class="btn ghost">📱 ひとつの端末をふたりであそぶ</button>
    </div>
    <p id="config-note" class="note hidden">
      オンライン対戦には Firebase の設定が必要です。<br>くわしくは README をみてね。
    </p>
  </section>

  <!-- ルーム待機画面 -->
  <section id="screen-wait" class="screen">
    <div class="wait-bear" id="wait-bear"></div>
    <h2>あいてを まってるよ…</h2>
    <p class="wait-hint">このコードを つたえてね</p>
    <div id="room-code-display" class="room-code"></div>
    <button id="btn-copy-link" class="btn secondary">🔗 しょうたいリンクをコピー</button>
    <button id="btn-cancel-wait" class="btn ghost">やめる</button>
  </section>

  <!-- ゲーム画面 -->
  <section id="screen-game" class="screen">
    <header class="game-header">
      <button id="btn-leave" class="icon-btn" aria-label="ホームへもどる">←</button>
      <span id="room-label"></span>
      <button id="btn-sound" class="icon-btn sound-btn" aria-label="効果音の切り替え">🔊</button>
    </header>
    <div class="players">
      <div id="panel-brown" class="player-card">
        <div class="avatar"></div>
        <div class="pinfo">
          <span class="pname">茶くま</span>
          <span class="pcount">2</span>
        </div>
        <span class="turn-paw">🐾</span>
      </div>
      <div id="panel-white" class="player-card">
        <div class="avatar"></div>
        <div class="pinfo">
          <span class="pname">しろくま</span>
          <span class="pcount">2</span>
        </div>
        <span class="turn-paw">🐾</span>
      </div>
    </div>
    <div id="board-wrap">
      <div class="board-ear left"></div>
      <div class="board-ear right"></div>
      <div id="board" role="grid" aria-label="リバーシの盤面"></div>
    </div>
    <p id="msg" class="message">&nbsp;</p>
    <div id="stamp-bar" class="stamp-bar hidden">
      <button class="stamp-btn" data-stamp="🐾">🐾</button>
      <button class="stamp-btn" data-stamp="🍯">🍯</button>
      <button class="stamp-btn" data-stamp="❤️">❤️</button>
      <button class="stamp-btn" data-stamp="😆">😆</button>
      <button class="stamp-btn" data-stamp="😭">😭</button>
      <button class="stamp-btn" data-stamp="👏">👏</button>
    </div>
    <div id="banner-offline" class="banner hidden">あいての つうしんが きれたみたい…</div>
  </section>

</div>

<!-- 結果オーバーレイ -->
<div id="overlay-result" class="overlay hidden">
  <div class="result-card">
    <div id="result-bear" class="result-bear"></div>
    <h2 id="result-title"></h2>
    <p id="result-score"></p>
    <p id="result-tally" class="result-tally hidden"></p>
    <div class="result-buttons">
      <button id="btn-rematch" class="btn primary">🔁 もういちど</button>
      <button id="btn-home" class="btn ghost">ホームへ</button>
    </div>
    <p id="rematch-note" class="note hidden">あいてを まってるよ…</p>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
