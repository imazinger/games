<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>くまのフリーセル</title>
<style>
  :root{
    --bg: #FBF6EC;
    --panel: #FFFFFF;
    --border: #E4DCC8;
    --border-strong: #D3C7A8;
    --text: #4A3F2E;
    --text-muted: #8A7F6A;
    --accent: #D8863E;
    --accent-dark: #A85F22;
    --success-bg: #E9F3DE;
    --success-text: #3B6D11;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html{
    overscroll-behavior-y: none;
    height: 100%;
  }
  body{
    margin:0;
    font-family: "Hiragino Maru Gothic ProN","Yu Gothic",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px 12px 60px;
    min-height: 100%;
    overscroll-behavior-y: none;
    touch-action: pan-x pan-y;
    -webkit-user-select: none;
    user-select: none;
  }
  .wrap{ max-width: 900px; margin: 0 auto; }
  h1{
    font-size: 22px;
    font-weight: 700;
    text-align:center;
    margin: 4px 0 18px;
    color: var(--accent-dark);
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom: 14px;
  }
  .moves{ font-size: 14px; color: var(--text-muted); }
  .btnrow{ display:flex; gap:8px; }
  button{
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1.5px solid var(--border-strong);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    transition: transform 0.08s, background 0.15s;
  }
  button:hover{ background: #FFF8EC; }
  button:active{ transform: scale(0.96); }
  button.primary{
    background: var(--accent);
    border-color: var(--accent-dark);
    color: white;
    font-weight: 600;
  }
  button.primary:hover{ background: var(--accent-dark); }

  .win-banner{
    background: var(--success-bg);
    color: var(--success-text);
    padding: 10px 16px;
    border-radius: var(--radius);
    margin-bottom: 14px;
    font-size: 14px;
    font-weight: 700;
    text-align:center;
  }

  .zone-label{
    font-size: 11px;
    color: var(--text-muted);
    margin: 0 0 6px 2px;
    font-weight: 600;
  }
  .top-zones{
    display:flex;
    gap: 28px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .slot-row{ display:flex; gap:8px; }

  .card{
    width: 62px;
    height: 92px;
    border-radius: 8px;
    background: var(--panel);
    border: 2px solid var(--border-strong);
    position: relative;
    cursor: pointer;
    user-select: none;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(80,60,20,0.15);
    transition: transform 0.1s, box-shadow 0.1s;
    flex-shrink: 0;
  }
  .card img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display:block;
    pointer-events:none;
  }
  .card.selected{
    transform: translateY(-8px);
    box-shadow: 0 6px 14px rgba(80,60,20,0.28);
  }
  .card.dim{ cursor: default; }
  .card.draggable{ touch-action: none; cursor: grab; }
  .card.dragging-source{ opacity: 0.25; }
  .card.joker{ border-color: #C99A2E; }
  .card.joker::after{
    content: "";
    position:absolute;
    inset:0;
    border: 2px solid #F0C24A;
    border-radius: 6px;
    pointer-events:none;
  }
  .drag-ghost{
    position: fixed;
    left: 0;
    top: 0;
    pointer-events: none;
    z-index: 1000;
    box-shadow: 0 10px 24px rgba(80,60,20,0.35);
    will-change: transform;
  }

  .empty-slot{
    width: 62px;
    height: 92px;
    border-radius: 8px;
    border: 2px dashed var(--border-strong);
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--text-muted);
    font-size: 18px;
    cursor:pointer;
    flex-shrink:0;
  }

  .tableau{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }
  .col{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height: 140px;
  }
  .col .card{ margin-top: -66px; }
  .col .card:first-child{ margin-top:0; }
  .col .empty-slot{ margin-top:0; }

  @media (max-width: 620px){
    .card, .empty-slot{ width: 48px; height: 72px; }
    .col .card{ margin-top: -52px; }
  }

  footer{
    text-align:center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 28px;
  }

  @keyframes hintPulse{
    0%, 100% { box-shadow: 0 0 0 3px rgba(0,0,0,0); }
    50% { box-shadow: 0 0 0 4px rgba(0,0,0,0.12); }
  }
  .card.hint-from{
    outline: 3px solid #4C9F70;
    outline-offset: 2px;
    animation: hintPulse 1.1s ease-in-out infinite;
  }
  .card.hint-to{
    outline: 3px solid #D8863E;
    outline-offset: 2px;
    animation: hintPulse 1.1s ease-in-out infinite;
  }
  .empty-slot.hint-to{
    outline: 3px solid #D8863E;
    outline-offset: 2px;
    animation: hintPulse 1.1s ease-in-out infinite;
  }
  .hint-msg{
    font-size: 13px;
    color: var(--accent-dark);
    background: #FFF3E0;
    border: 1px solid #F0C48A;
    border-radius: 10px;
    padding: 8px 12px;
    margin: 0 0 14px;
    display: none;
  }
  .hint-msg.show{ display: block; }
</style>
</head>
<body>
<div class="wrap">
  <h1>くまのフリーセル</h1>
  <div class="topbar">
    <div class="moves" id="movesLabel">手数: 0</div>
    <div class="btnrow">
      <button id="hintBtn">ヒント</button>
      <button id="autoBtn">そろえる</button>
      <button id="newBtn" class="primary">新しいゲーム</button>
    </div>
  </div>
  <div id="hintMsg" class="hint-msg"></div>
  <div id="winBanner"></div>

  <div class="top-zones">
    <div>
      <div class="zone-label">フリーセル</div>
      <div class="slot-row" id="freeRow"></div>
    </div>
    <div>
      <div class="zone-label">ファウンデーション</div>
      <div class="slot-row" id="foundRow"></div>
    </div>
  </div>

  <div class="zone-label">タブロー</div>
  <div class="tableau" id="tableau"></div>

  <footer>
    カードはドラッグ&amp;ドロップで移動できます(タップして選択 → もう一度タップで移動、でもOKです)。<br>
    タブローでは「1つ小さい数字(A&lt;B&lt;C…&lt;I)」のカードだけ重ねられます(絵柄は関係ありません)。<br>
    フリーセルには何でも1枚だけ一時的に置けます。ファウンデーションはA→Iの順に積んでいき、最後にJ(万能札)を置くとその山は完成です。<br>
    困ったら「ヒント」ボタンで、動かせるカード(緑)と置き場所(オレンジ)が光ります。
  </footer>
</div>

const RANKS = ["A","B","C","D","E","F","G","H","I"];
const JOKER = "J";
const RANK_VAL = Object.fromEntries(RANKS.map((r,i)=>[r,i+1]));
const NUM_COLS = 6;
const NUM_FREE = 4;
const NUM_COPIES = 4;
const NUM_FOUND = 4;

function makeDeck(){
  let deck = [];
  let counter = 0;
  for(let copy=0; copy<NUM_COPIES; copy++){
    RANKS.forEach(r=>{ deck.push({rank:r, id:"c"+(counter++)}); });
    deck.push({rank:JOKER, id:"c"+(counter++)});
  }
  for(let i=deck.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
  return deck;
}

function dealColumns(deck, numCols){
  const cols = Array.from({length:numCols}, ()=>[]);
  deck.forEach((card,i)=>{ cols[i % numCols].push(card); });
  return cols;
}

let state;

function newGame(){
  const deck = makeDeck();
  state = {
    cols: dealColumns(deck, NUM_COLS),
    free: Array(NUM_FREE).fill(null),
    found: Array(NUM_FOUND).fill(0),
    selected: null,
    moves: 0,
    won: false,
    hint: null,
    hintMessage: ""
  };
  render();
}

function getCard(loc){
  if(loc.type === "col"){
    const col = state.cols[loc.index];
    return col.length ? col[col.length-1] : null;
  }
  if(loc.type === "free") return state.free[loc.index];
  return null;
}

function removeFrom(loc){
  if(loc.type === "col") state.cols[loc.index].pop();
  else if(loc.type === "free") state.free[loc.index] = null;
}

function canStackTableau(card, target){
  if(!target) return true;
  if(card.rank === JOKER || target.rank === JOKER) return true;
  return RANK_VAL[target.rank] === RANK_VAL[card.rank] + 1;
}

function canGoFoundation(card, pileIndex){
  const n = state.found[pileIndex];
  if(n < RANKS.length) return card.rank === RANKS[n];
  if(n === RANKS.length) return card.rank === JOKER;
  return false;
}

function attemptMove(from, to, card){
  if(to.type === "free"){
    if(state.free[to.index] !== null) return false;
    removeFrom(from);
    state.free[to.index] = card;
    return true;
  }
  if(to.type === "found"){
    if(!canGoFoundation(card, to.index)) return false;
    removeFrom(from);
    state.found[to.index] += 1;
    return true;
  }
  if(to.type === "col"){
    const target = state.cols[to.index];
    const top = target.length ? target[target.length-1] : null;
    if(!canStackTableau(card, top)) return false;
    removeFrom(from);
    state.cols[to.index].push(card);
    return true;
  }
  return false;
}

function checkWin(){
  return state.found.every(n => n === RANKS.length + 1);
}

function performMove(from, to){
  const card = getCard(from);
  if(!card) return false;
  const sameSpot = from.type === to.type && from.index === to.index;
  if(sameSpot) return false;
  const moved = attemptMove(from, to, card);
  if(moved){
    state.moves += 1;
    state.hint = null;
    state.hintMessage = "";
    if(checkWin()) state.won = true;
  }
  return moved;
}

function trySelect(loc){
  if(state.won) return;
  if(!state.selected){
    const card = getCard(loc);
    if(!card) return;
    state.selected = loc;
    render();
    return;
  }
  const from = state.selected;
  const sameSpot = from.type === loc.type && from.index === loc.index;
  if(sameSpot){ state.selected = null; render(); return; }
  performMove(from, loc);
  state.selected = null;
  render();
}

function trySelectFoundation(pileIndex){
  if(state.won) return;
  if(!state.selected) return;
  const from = state.selected;
  performMove(from, {type:"found", index:pileIndex});
  state.selected = null;
  render();
}

function findAutoFoundationIndex(card){
  for(let i=0;i<NUM_FOUND;i++){
    if(canGoFoundation(card, i)) return i;
  }
  return -1;
}

function autoFoundation(){
  state.hint = null;
  state.hintMessage = "";
  let changed = true;
  while(changed){
    changed = false;
    state.cols.forEach((col)=>{
      if(col.length){
        const c = col[col.length-1];
        const idx = findAutoFoundationIndex(c);
        if(idx !== -1){ col.pop(); state.found[idx]+=1; changed=true; }
      }
    });
    state.free.forEach((c,fi)=>{
      if(c){
        const idx = findAutoFoundationIndex(c);
        if(idx !== -1){ state.free[fi]=null; state.found[idx]+=1; changed=true; }
      }
    });
  }
  state.selected = null;
  if(checkWin()) state.won = true;
  render();
}

function locEq(a, b){
  return a && b && a.type === b.type && a.index === b.index;
}

function findMovableSources(){
  const sources = [];
  state.cols.forEach((col, ci)=>{
    if(col.length) sources.push({loc:{type:"col", index:ci}, card: col[col.length-1]});
  });
  state.free.forEach((c, fi)=>{
    if(c) sources.push({loc:{type:"free", index:fi}, card: c});
  });
  return sources;
}

function findHint(){
  const sources = findMovableSources();

  // 1. Card that can go straight to a foundation.
  for(const s of sources){
    const idx = findAutoFoundationIndex(s.card);
    if(idx !== -1){
      return {from: s.loc, to:{type:"found", index:idx}};
    }
  }

  // 2. Moving a column's top card away would let the card beneath it
  //    go to a foundation right away.
  for(let ci=0; ci<state.cols.length; ci++){
    const col = state.cols[ci];
    if(col.length < 2) continue;
    const top = col[col.length-1];
    const second = col[col.length-2];
    if(findAutoFoundationIndex(second) === -1) continue;
    for(let cj=0; cj<state.cols.length; cj++){
      if(cj === ci) continue;
      const targetCol = state.cols[cj];
      const targetTop = targetCol.length ? targetCol[targetCol.length-1] : null;
      if(canStackTableau(top, targetTop)){
        return {from:{type:"col", index:ci}, to:{type:"col", index:cj}};
      }
    }
    const freeIdx = state.free.findIndex(c=>c===null);
    if(freeIdx !== -1){
      return {from:{type:"col", index:ci}, to:{type:"free", index:freeIdx}};
    }
  }

  // 3. Any legal tableau-to-tableau move that isn't pointless.
  for(const s of sources){
    if(s.loc.type !== "col") continue;
    const col = state.cols[s.loc.index];
    for(let cj=0; cj<state.cols.length; cj++){
      if(cj === s.loc.index) continue;
      const targetCol = state.cols[cj];
      if(targetCol.length === 0 && col.length === 1) continue;
      const targetTop = targetCol.length ? targetCol[targetCol.length-1] : null;
      if(canStackTableau(s.card, targetTop)){
        return {from: s.loc, to:{type:"col", index:cj}};
      }
    }
  }

  // 4. Last resort: park a buried column's top card in a free cell.
  const freeIdx = state.free.findIndex(c=>c===null);
  if(freeIdx !== -1){
    for(const s of sources){
      if(s.loc.type === "col" && state.cols[s.loc.index].length > 1){
        return {from: s.loc, to:{type:"free", index:freeIdx}};
      }
    }
  }

  return null;
}

function hintMessageText(hint){
  if(hint.to.type === "found") return "緑のカードを、オレンジのファウンデーションに置けます。";
  if(hint.to.type === "free") return "緑のカードを、オレンジのフリーセルに移動してみましょう。";
  return "緑のカードを、オレンジの場所に移動してみましょう。";
}

function showHint(){
  const hint = findHint();
  if(!hint){
    state.hint = null;
    state.hintMessage = "今動かせるカードが見つかりませんでした。「新しいゲーム」もお試しください。";
  } else {
    state.hint = hint;
    state.hintMessage = hintMessageText(hint);
  }
  render();
}

function isSelected(loc){
  return state.selected && state.selected.type === loc.type && state.selected.index === loc.index;
}

function cardEl(card, loc, opts){
  opts = opts || {};
  const div = document.createElement("div");
  let cls = "card";
  if(isSelected(loc)) cls += " selected";
  if(opts.dim) cls += " dim";
  if(card.rank === JOKER) cls += " joker";
  if(!opts.dim && state.hint){
    if(locEq(state.hint.from, loc)) cls += " hint-from";
    if(locEq(state.hint.to, loc)) cls += " hint-to";
  }
  const draggable = !opts.dim && !opts.onFoundationClick;
  if(draggable) cls += " draggable";
  div.className = cls;
  div.dataset.locType = loc.type;
  div.dataset.locIndex = String(loc.index);
  const img = document.createElement("img");
  img.src = CARD_IMAGES[card.rank];
  img.alt = card.rank;
  div.appendChild(img);
  if(opts.onFoundationClick){
    div.addEventListener("click", opts.onFoundationClick);
  } else if(draggable){
    attachDrag(div, loc);
  }
  return div;
}

function emptySlotEl(loc, label){
  const div = document.createElement("div");
  let cls = "empty-slot";
  if(state.hint && locEq(state.hint.to, loc)) cls += " hint-to";
  div.className = cls;
  div.dataset.locType = loc.type;
  div.dataset.locIndex = String(loc.index);
  div.textContent = label || "";
  div.addEventListener("click", ()=> trySelect(loc));
  return div;
}

function render(){
  document.getElementById("movesLabel").textContent = "手数: " + state.moves;

  const hintMsgEl = document.getElementById("hintMsg");
  if(state.hintMessage){
    hintMsgEl.textContent = state.hintMessage;
    hintMsgEl.classList.add("show");
  } else {
    hintMsgEl.textContent = "";
    hintMsgEl.classList.remove("show");
  }

  const winBanner = document.getElementById("winBanner");
  winBanner.innerHTML = "";
  if(state.won){
    const d = document.createElement("div");
    d.className = "win-banner";
    d.textContent = "クリア! " + state.moves + "手で完成しました";
    winBanner.appendChild(d);
  }

  const freeRow = document.getElementById("freeRow");
  freeRow.innerHTML = "";
  state.free.forEach((c,i)=>{
    const loc = {type:"free", index:i};
    if(c) freeRow.appendChild(cardEl(c, loc));
    else freeRow.appendChild(emptySlotEl(loc));
  });

  const foundRow = document.getElementById("foundRow");
  foundRow.innerHTML = "";
  for(let i=0;i<NUM_FOUND;i++){
    const n = state.found[i];
    const loc = {type:"found", index:i};
    if(n === 0){
      const el = emptySlotEl(loc, "");
      el.addEventListener("click", ()=> trySelectFoundation(i));
      foundRow.appendChild(el);
    } else {
      const rank = n <= RANKS.length ? RANKS[n-1] : JOKER;
      const card = {rank};
      const el = cardEl(card, loc, {onFoundationClick: ()=> trySelectFoundation(i)});
      foundRow.appendChild(el);
    }
  }

  const tableau = document.getElementById("tableau");
  tableau.innerHTML = "";
  state.cols.forEach((col, ci)=>{
    const colDiv = document.createElement("div");
    colDiv.className = "col";
    colDiv.dataset.locType = "col";
    colDiv.dataset.locIndex = String(ci);
    if(col.length === 0){
      colDiv.appendChild(emptySlotEl({type:"col", index:ci}));
    } else {
      col.forEach((card, ri)=>{
        const isTop = ri === col.length - 1;
        const loc = {type:"col", index:ci};
        colDiv.appendChild(cardEl(card, loc, {dim: !isTop}));
      });
    }
    tableau.appendChild(colDiv);
  });
}

document.getElementById("hintBtn").addEventListener("click", showHint);
document.getElementById("autoBtn").addEventListener("click", autoFoundation);

let dragState = null;

function attachDrag(el, loc){
  el.addEventListener("pointerdown", (e)=>{
    if(state.won) return;
    if(e.button !== undefined && e.button !== 0) return;
    const rect = el.getBoundingClientRect();
    dragState = {
      from: loc,
      pointerId: e.pointerId,
      startX: e.clientX,
      startY: e.clientY,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      width: rect.width,
      height: rect.height,
      moved: false,
      ghost: null,
      sourceEl: el
    };
  });
}

function startGhost(){
  const ghost = dragState.sourceEl.cloneNode(true);
  ghost.className = "card drag-ghost";
  ghost.style.width = dragState.width + "px";
  ghost.style.height = dragState.height + "px";
  document.body.appendChild(ghost);
  dragState.ghost = ghost;
  dragState.sourceEl.classList.add("dragging-source");
}

function moveGhost(x, y){
  if(!dragState.ghost) return;
  const left = x - dragState.offsetX;
  const top = y - dragState.offsetY;
  dragState.ghost.style.transform = "translate(" + left + "px, " + top + "px) rotate(-4deg) scale(1.05)";
}

function findDropLoc(x, y){
  const el = document.elementFromPoint(x, y);
  if(!el) return null;
  const target = el.closest("[data-loc-type]");
  if(!target) return null;
  return { type: target.dataset.locType, index: Number(target.dataset.locIndex) };
}

function endDrag(x, y){
  if(!dragState) return;
  const wasMoved = dragState.moved;
  const from = dragState.from;
  if(dragState.ghost) dragState.ghost.remove();
  if(dragState.sourceEl) dragState.sourceEl.classList.remove("dragging-source");
  dragState = null;
  if(wasMoved){
    const dropLoc = findDropLoc(x, y);
    if(dropLoc) performMove(from, dropLoc);
    state.selected = null;
    render();
  } else {
    trySelect(from);
  }
}

document.addEventListener("pointermove", (e)=>{
  if(!dragState || e.pointerId !== dragState.pointerId) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  if(!dragState.moved && Math.hypot(dx, dy) > 6){
    dragState.moved = true;
    startGhost();
  }
  if(dragState.moved){
    e.preventDefault();
    moveGhost(e.clientX, e.clientY);
  }
}, { passive: false });

document.addEventListener("pointerup", (e)=>{
  if(!dragState || e.pointerId !== dragState.pointerId) return;
  endDrag(e.clientX, e.clientY);
});

document.addEventListener("pointercancel", (e)=>{
  if(!dragState || e.pointerId !== dragState.pointerId) return;
  if(dragState.ghost) dragState.ghost.remove();
  if(dragState.sourceEl) dragState.sourceEl.classList.remove("dragging-source");
  dragState = null;
});

let touchStartY = 0;
document.body.addEventListener("touchstart", (e)=>{
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.body.addEventListener("touchmove", (e)=>{
  const dy = e.touches[0].clientY - touchStartY;
  if(window.scrollY <= 0 && dy > 0){
    e.preventDefault();
  }
}, { passive: false });
document.getElementById("newBtn").addEventListener("click", newGame);

newGame();
</script>
</body>
</html>
